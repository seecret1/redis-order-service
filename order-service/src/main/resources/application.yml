server:
  port: 8081

logging:
  level:
    com.github.seecret1: DEBUG

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5433/orders}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: update

app:
  cache:
    cache-names:
      - orders
      - order
    caches:
      orders:
        expiry: 5m
      order:
        expiry: 10m