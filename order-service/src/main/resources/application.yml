server:
  port: 8081

logging:
  level:
    com.github.seecret1: DEBUG

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:orders_db}}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: update

app:
  cache:
    cache-names:
      - orders
      - order
    caches:
      orders:
        expiry: 5m
      order:
        expiry: 10m

  redis:
    stream:
      pollTimeout: 500ms
